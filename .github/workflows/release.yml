name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build (sidecars)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            callback-popup
            tel-handler
            desktop-client/src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop-client/package-lock.json

      - name: Build callback-popup sidecar
        working-directory: callback-popup
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Build tel-handler sidecar
        working-directory: tel-handler
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage sidecars with platform suffix
        shell: pwsh
        run: |
          $dest = "desktop-client/src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item `
            "callback-popup/target/x86_64-pc-windows-msvc/release/callback-popup.exe" `
            "$dest/callback-popup-x86_64-pc-windows-msvc.exe" -Force
          Copy-Item `
            "tel-handler/target/x86_64-pc-windows-msvc/release/tel-handler.exe" `
            "$dest/tel-handler-x86_64-pc-windows-msvc.exe" -Force
          Get-ChildItem $dest

      - name: Install frontend dependencies
        working-directory: desktop-client
        run: npm ci

      - name: Build & publish Tauri release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop-client
          tagName: ${{ github.ref_name }}
          releaseName: "4dy Client ${{ github.ref_name }}"
          releaseBody: |
            Automated build of `${{ github.ref_name }}`. Release notes will be updated with SHA256 checksums after the build finishes.
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Compute SHA256 checksums and update release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $bundleDir = "desktop-client/src-tauri/target/x86_64-pc-windows-msvc/release/bundle"

          $files = @()
          $files += Get-ChildItem -Path "$bundleDir/msi"  -Filter "*.msi" -ErrorAction SilentlyContinue
          $files += Get-ChildItem -Path "$bundleDir/nsis" -Filter "*.exe" -ErrorAction SilentlyContinue

          if ($files.Count -eq 0) {
            Write-Error "No installer artifacts found under $bundleDir"
            exit 1
          }

          $checksumLines = @()
          foreach ($f in $files) {
            $hash = (Get-FileHash -Path $f.FullName -Algorithm SHA256).Hash.ToLower()
            Write-Host "$($f.Name)  $hash"
            $checksumLines += '- `' + $f.Name + '`: `' + $hash + '`'
          }

          $header = @(
            'Automated build of `${{ github.ref_name }}`.'
            ''
            '**Installers**'
            '- `.msi`: Windows Installer'
            '- `.exe`: NSIS installer'
            ''
            '> **Not code-signed.** Windows SmartScreen will warn on first run. Click **More info** -> **Run anyway**. See the README for details.'
            ''
            '**SHA256 checksums**'
            ''
          )

          $footer = @(
            ''
            'Verify a downloaded installer with:'
            ''
            '```powershell'
            'Get-FileHash -Algorithm SHA256 .\<downloaded-file>'
            '```'
            ''
            'See `README.md` for setup instructions.'
          )

          $body = $header + $checksumLines + $footer

          $bodyFile = New-TemporaryFile
          Set-Content -Path $bodyFile -Value $body -Encoding utf8
          gh release edit "${{ github.ref_name }}" --notes-file "$bodyFile" --repo "${{ github.repository }}"
